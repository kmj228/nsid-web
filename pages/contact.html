<section class="page" id="page-contact">

    <div class="contact-wrap">

      <!-- 헤더 -->
      <div class="contact-hero fade-up">
        <span class="sec__tag">CONTACT US</span>
        <h2 class="contact-hero__title">견적 및 상담 문의</h2>
        <p class="contact-hero__desc">제품 도입, 기술 문의, 견적 요청 등 궁금하신 사항을 남겨주시면<br/>빠른 시일 내에 담당자가 연락드리겠습니다.</p>
      </div>

      <div class="contact-body">

        <!-- 사이드바 + 폼 래퍼 -->
        <div class="contact-layout fade-up">

        <!-- 왼쪽 사이드바 -->
        <aside class="contact-sidebar">
          <div class="csb__inner">
            <div class="csb__brand">
              <img src="img/ft_logo.png" alt="엔시드" class="csb__logo-img"
                   onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"/>
              <span class="csb__logo-fallback">
                <span class="csb__logo-mark">N</span>
                <span class="csb__logo-text">NSID</span>
              </span>
            </div>
            <div class="csb__items">
              <div class="csb__item">
                <div class="csb__icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 13a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.6 2.18h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 9.91a16 16 0 0 0 6 6l.91-.91a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 21.73 17z"/></svg></div>
                <div>
                  <p class="csb__item-label">대표전화</p>
                  <p class="csb__item-value">031-8091-0381</p>
                </div>
              </div>
              <div class="csb__item">
                <div class="csb__icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="5" y="2" width="14" height="20" rx="2"/><line x1="12" y1="18" x2="12.01" y2="18"/></svg></div>
                <div>
                  <p class="csb__item-label">팩스</p>
                  <p class="csb__item-value">031-5176-0690</p>
                </div>
              </div>
              <div class="csb__item">
                <div class="csb__icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg></div>
                <div>
                  <p class="csb__item-label">주소</p>
                  <p class="csb__item-value">경기 안양시 동안구<br/>엘에스로116번길 25-32<br/>안양 SK V1 center 605호</p>
                </div>
              </div>
              <div class="csb__item">
                <div class="csb__icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></div>
                <div>
                  <p class="csb__item-label">운영시간</p>
                  <p class="csb__item-value">평일 09:00 – 18:00<br/><span class="csb__item-note">점심 12:00 – 13:00<br/>주말·공휴일 휴무</span></p>
                </div>
              </div>
            </div>
            <div class="csb__note">
              문의 접수 후 영업일 기준<br/><strong>1–2일 내</strong> 담당자가 연락드립니다.
            </div>
          </div>
        </aside>

        <!-- 문의 폼 -->
        <div class="contact-form-wrap">
          <form class="contact-form" id="contactForm" onsubmit="return false;">

            <!-- 문의 유형 + 제목 (상단 강조 행) -->
            <div class="cf-title-bar">
              <div class="cf-field cf-field--type">
                <label class="cf-label">문의 유형 <span class="cf-required">*</span></label>
                <select class="cf-input cf-select" id="fType">
                  <option value="" disabled selected>선택</option>
                  <option value="estimate">견적 문의</option>
                  <option value="consult">기술 상담</option>
                  <option value="product">제품 문의</option>
                  <option value="etc">기타</option>
                </select>
              </div>
              <div class="cf-field cf-field--title">
                <label class="cf-label">제목 <span class="cf-required">*</span></label>
                <input class="cf-input" type="text" id="fTitle" placeholder="문의 제목을 입력해주세요"/>
              </div>
            </div>

            <!-- 작성자 정보 (2열) -->
            <div class="cf-row">
              <div class="cf-field">
                <label class="cf-label">회사명</label>
                <input class="cf-input" type="text" id="fCompany" placeholder="회사명을 입력해주세요"/>
              </div>
              <div class="cf-field">
                <label class="cf-label">작성자 <span class="cf-required">*</span></label>
                <input class="cf-input" type="text" id="fName" placeholder="이름을 입력해주세요"/>
              </div>
              <div class="cf-field">
                <label class="cf-label">연락처 <span class="cf-required">*</span></label>
                <input class="cf-input" type="tel" id="fTel" placeholder="010-0000-0000"/>
              </div>
              <div class="cf-field">
                <label class="cf-label">이메일</label>
                <input class="cf-input" type="email" id="fEmail" placeholder="이메일을 입력해주세요"/>
              </div>
            </div>

            <!-- 문의 내용 -->
            <div class="cf-field">
              <div class="cf-label-row">
                <label class="cf-label">문의 내용 <span class="cf-required">*</span></label>
                <span class="cf-char-counter"><span id="fContentCount">0</span> / 300</span>
              </div>
              <textarea class="cf-input cf-textarea" id="fContent" placeholder="문의 내용을 자세히 입력해주세요" maxlength="300"></textarea>
            </div>

            <!-- 첨부파일 -->
            <div class="cf-field">
              <label class="cf-label">첨부파일</label>
              <label class="cf-file-zone" id="fileLabelBox">
                <input type="file" class="contact-form__file-input" id="fileInput" multiple accept="*/*" onchange="handleFileChange(this)"/>
                <span class="cf-file-icon">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66L9.41 17.41a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
                </span>
                <span class="cf-file-text" id="fileText">파일을 여기에 드래그하거나 클릭해서 선택하세요</span>
                <span class="cf-file-btn">파일 선택</span>
              </label>
              <div class="contact-form__file-list" id="fileList"></div>
            </div>

            <!-- 구분선 -->
            <div class="cf-divider"></div>

            <!-- 개인정보 동의 + 버튼 -->
            <div class="cf-footer">
              <label class="cf-privacy-toggle">
                <input type="checkbox" class="cf-checkbox" id="privacyAgree"/>
                <span class="cf-privacy-toggle__box">
                  <svg width="11" height="11" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="1.5 6 4.5 9 10.5 3"/></svg>
                </span>
                <span class="cf-privacy-toggle__text">개인정보 수집 및 이용에 동의합니다.</span>
                <a class="cf-privacy-toggle__link" href="#" onclick="event.preventDefault(); openPrivacyModal(); this.blur()">(내용 보기)</a>
              </label>
              <button type="submit" class="btn btn--primary cf-submit-btn" id="contactSubmitBtn" disabled>
                문의 보내기
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
              </button>
            </div>

          </form>
        </div>

        </div><!-- /contact-layout -->

      </div>
    </div>

  </section>
